<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>环境温度监测系统综合设计 - 期末汇报</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #EAE6DF;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  #stage {
    position: fixed;
    background: #FCFAF7;
    box-shadow: 0 25px 50px -12px rgba(25, 24, 22, 0.15);
    border-radius: 12px;
    overflow: hidden;
  }
  #stage iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: transparent;
  }
  .counter {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(252, 250, 247, 0.95);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(25, 24, 22, 0.08);
    color: #191816;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    z-index: 999999 !important;
    user-select: none;
    box-shadow: 0 4px 12px rgba(25,24,22,0.05);
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .counter:hover {
    background: #CC5A01;
    color: #FCFAF7;
    border-color: #CC5A01;
  }
  .counter:hover .label {
    color: #FCFAF7;
  }
  .menu-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(25, 24, 22, 0.3);
    backdrop-filter: blur(4px);
    z-index: 999997 !important;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .deck-menu {
    position: fixed;
    bottom: 80px;
    right: 24px;
    width: 380px;
    max-height: 500px;
    background: rgba(252, 250, 247, 0.98);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(25, 24, 22, 0.08);
    border-radius: 16px;
    color: #191816;
    z-index: 999998 !important;
    box-shadow: 0 20px 25px -5px rgba(25, 24, 22, 0.1), 0 10px 10px -5px rgba(25, 24, 22, 0.05);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform: translateY(20px) scale(0.95);
    opacity: 0;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  }
  .deck-menu.open {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  .deck-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(25, 24, 22, 0.08);
  }
  .deck-menu-header h3 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .close-menu-btn {
    background: transparent;
    border: none;
    color: #807A70;
    font-size: 20px;
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .close-menu-btn:hover {
    color: #191816;
  }
  .deck-menu-list {
    overflow-y: auto;
    padding: 10px 0;
    flex-grow: 1;
  }
  .deck-menu-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    cursor: pointer;
    font-size: 14px;
    color: #47443E;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
  }
  .deck-menu-item:hover {
    background: rgba(25, 24, 22, 0.04);
    color: #191816;
  }
  .deck-menu-item.active {
    background: rgba(15, 118, 110, 0.1);
    color: #0F766E;
    border-left-color: #0F766E;
    font-weight: 600;
  }
  .counter .label {
    color: #807A70;
    margin-left: 8px;
    font-weight: 400;
  }
  .nav-zone {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    width: 60px; height: 60px;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left  { left: 30px; }
  .nav-zone.right { right: 30px; }
  .nav-hint {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 999px;
    background: rgba(25, 24, 22, 0.08);
    border: 1px solid rgba(25, 24, 22, 0.15);
    color: rgba(25, 24, 22, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 300;
    opacity: 0.4;
    transition: all 0.2s ease;
  }
  .nav-zone:hover .nav-hint {
    opacity: 1;
    background: rgba(25, 24, 22, 0.15);
    color: var(--text-primary);
  }
  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { background: #fff; overflow: visible; height: auto; }
    #stage { position: static; transform: none !important; box-shadow: none; border-radius: 0; }
    .counter, .nav-zone { display: none !important; }
    .print-stack { display: block; }
    .print-stack iframe {
      width: 1920px;
      height: 1080px;
      page-break-after: always;
      display: block;
    }
  }
  .swipe-curtain {
    position: fixed;
    top: 0; left: 0;
    width: 0%; height: 100%;
    background: linear-gradient(135deg, #CC5A01 0%, #0F766E 100%);
    z-index: 999;
    pointer-events: none;
    box-shadow: 0 0 50px rgba(204, 90, 1, 0.2);
    transform: skewX(-8deg);
    transform-origin: left top;
  }
  .transition-toast {
    position: fixed;
    top: 32px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(252, 250, 247, 0.95);
    border: 1px solid rgba(15, 118, 110, 0.3);
    box-shadow: 0 10px 25px rgba(25, 24, 22, 0.05);
    color: #0F766E;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.1em;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(8px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
</style>
</head>
<body>
<div class="swipe-curtain" id="swipeCurtain"></div>
<div class="transition-toast" id="transitionToast"></div>
<div id="stage">
  <iframe id="frame1" src="about:blank" style="opacity: 1; z-index: 2;" allow="autoplay"></iframe>
  <iframe id="frame2" src="about:blank" style="opacity: 0; z-index: 1; pointer-events: none;" allow="autoplay"></iframe>
</div>
<div class="nav-zone left" id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div class="counter" id="counter">1 / 26</div>
<!-- Slide Index Menu popup -->
<div id="menuOverlay" class="menu-overlay" style="display: none;"></div>
<div id="deckMenu" class="deck-menu" style="display: none;">
  <div class="deck-menu-header">
    <h3>幻灯片目录</h3>
    <button id="closeMenuBtn" class="close-menu-btn">&times;</button>
  </div>
  <div class="deck-menu-list" id="deckMenuList"></div>
</div>
<div class="print-stack" id="printStack" style="display:none;"></div>
<script>
(function () {
  window.DECK_MANIFEST = [
    { file: "slides/section0-01-cover.html",             label: "封面" },
    { file: "slides/section0-02-agenda.html",            label: "汇报目录与系统设计大纲" },
    { file: "slides/section1-01-divider-background.html", label: "01 项目背景与应用场景定位" },
    { file: "slides/section1-02-background.html",        label: "01 项目背景与智能家居系统架构" },
    { file: "slides/section2-01-divider-hardware.html",   label: "02 物理硬件底座与引脚重构" },
    { file: "slides/section2-02-hardware-layout.html",    label: "02 系统硬件组成与接口类型全览" },
    { file: "slides/section2-03-pin-reconfig.html",      label: "02 引脚冲突规避与物理重排重映射" },
    { file: "slides/section3-01-divider-driver.html",     label: "03 底层驱动协议与时序优化" },
    { file: "slides/section3-02-bus-overview.html",      label: "03 系统通信总线与传输协议规范" },
    { file: "slides/section3-03-protocol-drivers.html",  label: "03 底层驱动协议开发与深度寄存器优化" },
    { file: "slides/section4-01-divider-ui.html",        label: "04 HUD UI 设计与高保真仿真展示" },
    { file: "slides/section4-02-hud-pages-overview.html",label: "04 HUD 六大核心功能页面全览" },
    { file: "slides/section4-03-hud-ui-design.html",     label: "04 TFT-LCD 界面布局设计与双主题对比" },
    { file: "slides/section4-04-hmi-controls.html",      label: "04 多通道人机交互：实体/触屏/红外遥控" },
    { file: "slides/section5-01-divider-algorithm.html", label: "05 边缘端轻量级计算与算法优化" },
    { file: "slides/section5-02-edge-algorithms.html",   label: "05 边缘端轻量级计算特征提取算法" },
    { file: "slides/section5-03-anomaly-log.html",       label: "05 异常状态追溯与历史数据环形队列" },
    { file: "slides/section5-04-dirty-rects.html",       label: "05 LCD 图形渲染优化与增量更新算法" },
    { file: "slides/section6-01-divider-security.html",  label: "06 多通道安全网关与物联网通信" },
    { file: "slides/section6-02-home-security.html",     label: "06 智能居家多级安全防护功能设计" },
    { file: "slides/section6-03-wechat-logging.html",    label: "06 云边端物联网通信与 SD 日志归档" },
    { file: "slides/section7-01-divider-testing.html",   label: "07 整机联合调试与系统总结" },
    { file: "slides/section7-02-joint-verification.html", label: "07 系统联合测试与运行指标验证" },
    { file: "slides/section7-03-summary.html",           label: "07 系统设计总结" },
    { file: "slides/section7-04-experience.html",        label: "07 系统设计经验与感悟分享" },
    { file: "slides/section7-05-contributions.html",     label: "07 团队分工与开源贡献" },
    { file: "slides/section8-01-thanks.html",            label: "08 谢幕致谢" }
  ];

  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST;
  const stage = document.getElementById('stage');
  const frame1 = document.getElementById('frame1');
  const frame2 = document.getElementById('frame2');
  let currentFrame = frame1;
  let nextFrame = frame2;
  const counter = document.getElementById('counter');
  const printStack = document.getElementById('printStack');
  const storageKey = 'deck-index-' + location.pathname;
  let current = 0;
  let currentScale = 1;

  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    currentScale = Math.min(window.innerWidth / W, window.innerHeight / H);
    // 使用 zoom 替代 transform scale，实现真矢量高像素渲染
    stage.style.zoom = currentScale;
    
    const visualW = W * currentScale;
    const visualH = H * currentScale;
    const leftPx = (window.innerWidth - visualW) / 2;
    const topPx = (window.innerHeight - visualH) / 2;
    
    // Chrome中，left和top的值也会被zoom等比例缩放，所以要除以 currentScale 以抵消影响
    stage.style.left = (leftPx / currentScale) + 'px';
    stage.style.top = (topPx / currentScale) + 'px';
    stage.style.transform = 'none';
  }

  function show(idx) {
    if (idx < 0 || idx >= deck.length) return; if (current === idx && stage.style.opacity === '1') return;
    current = idx;
    nextFrame.src = deck[idx].file + '?v=' + Date.now();
    counter.innerHTML = `${idx + 1} / ${deck.length} <span class="label">${deck[idx].label || ''}</span>`;
    try { localStorage.setItem(storageKey, String(idx)); } catch (_) {}
    if (location.hash !== '#' + (idx + 1)) {
      history.replaceState(null, '', '#' + (idx + 1));
    }
    updateMenuHighlight(idx);
    stage.style.opacity = '1';
    stage.style.transform = 'none';
  }

  function setupFrameListener(frame) {
    frame.addEventListener('load', () => {
      if (frame === nextFrame) {
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          if (doc && doc.head) {
            const style = doc.createElement('style');
            style.textContent = '.slide-footer .slide-number { display: none !important; }';
            doc.head.appendChild(style);
          }
          if (frame.contentWindow) {
            frame.contentWindow.addEventListener('keydown', (e) => {
              document.dispatchEvent(new KeyboardEvent('keydown', {
                key: e.key, code: e.code, keyCode: e.keyCode, which: e.which,
                bubbles: true, ctrlKey: e.ctrlKey, shiftKey: e.shiftKey, altKey: e.altKey, metaKey: e.metaKey
              }));
            });
          }
        } catch (e) {
          console.warn("Could not inject style or add event forwarding inside iframe:", e);
        }
        nextFrame.style.opacity = '1';
        nextFrame.style.zIndex = '2';
        nextFrame.style.pointerEvents = 'auto';
        currentFrame.style.opacity = '0';
        currentFrame.style.zIndex = '1';
        currentFrame.style.pointerEvents = 'none';
        const temp = currentFrame;
        currentFrame = nextFrame;
        nextFrame = temp;
      }
    });
  }

  setupFrameListener(frame1);
  setupFrameListener(frame2);

  function next() { show(Math.min(current + 1, deck.length - 1)); }
  function prev() { show(Math.max(current - 1, 0)); }

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft':  case 'PageUp':              e.preventDefault(); prev(); break;
      case 'Home':                                    e.preventDefault(); show(0); break;
      case 'End':                                     e.preventDefault(); show(deck.length - 1); break;
      case 'p': case 'P':                             window.print(); break;
      default:
        if (e.key >= '1' && e.key <= '9') {
          const i = parseInt(e.key, 10) - 1;
          if (i < deck.length) { e.preventDefault(); show(i); }
        }
    }
  });

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', () => {
    const m = location.hash.match(/^#(\d+)$/);
    if (m) show(parseInt(m[1], 10) - 1);
  });

  const hashMatch = location.hash.match(/^#(\d+)$/);
  if (hashMatch) {
    current = Math.min(parseInt(hashMatch[1], 10) - 1, deck.length - 1);
  } else {
    try {
      const v = parseInt(localStorage.getItem(storageKey), 10);
      if (!isNaN(v) && v >= 0 && v < deck.length) current = v;
    } catch (_) {}
  }
  fit();
  show(current);

  const deckMenu = document.getElementById('deckMenu');
  const deckMenuList = document.getElementById('deckMenuList');
  const menuOverlay = document.getElementById('menuOverlay');
  const closeMenuBtn = document.getElementById('closeMenuBtn');

  function buildMenu() {
    deckMenuList.innerHTML = '';
    deck.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'deck-menu-item';
      if (idx === current) div.classList.add('active');
      div.textContent = item.label || `Slide ${idx + 1}`;
      div.addEventListener('click', () => {
        show(idx);
        closeMenu();
      });
      deckMenuList.appendChild(div);
    });
  }

  function updateMenuHighlight(idx) {
    const items = deckMenuList.querySelectorAll('.deck-menu-item');
    items.forEach((item, i) => {
      if (i === idx) {
        item.classList.add('active');
        try { item.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); } catch (_) {}
      } else {
        item.classList.remove('active');
      }
    });
  }

  function openMenu() {
    buildMenu();
    // 强制使用内联样式暴击，无视一切外部CSS干扰
    deckMenu.setAttribute("style", "display: flex !important; flex-direction: column !important; opacity: 1 !important; transform: none !important; z-index: 2147483647 !important; position: fixed !important; bottom: 80px !important; right: 24px !important; width: 380px !important; max-height: 500px !important; background: rgba(252, 250, 247, 0.98) !important; border: 1px solid rgba(25, 24, 22, 0.08) !important; border-radius: 16px !important; box-shadow: 0 20px 25px -5px rgba(25,24,22,0.1) !important;");
    menuOverlay.setAttribute("style", "display: block !important; opacity: 1 !important; z-index: 2147483646 !important; background: rgba(25, 24, 22, 0.3) !important; position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;");
    deckMenu.classList.add('open');
  }

  function closeMenu() {
    deckMenu.classList.remove('open');
    deckMenu.setAttribute("style", "display: none !important;");
    menuOverlay.setAttribute("style", "display: none !important;");
  }

  counter.addEventListener('click', (e) => {
    e.stopPropagation();
    // 采用更稳妥的状态检测
    if (deckMenu.style.display.includes('flex') || deckMenu.classList.contains('open')) {
      closeMenu();
    } else {
      openMenu();
    }
  });

  closeMenuBtn.addEventListener('click', closeMenu);
  menuOverlay.addEventListener('click', closeMenu);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMenu();
  });

  window.addEventListener('beforeprint', () => {
    printStack.innerHTML = '';
    deck.forEach(item => {
      const f = document.createElement('iframe');
      f.src = item.file;
      printStack.appendChild(f);
    });
    printStack.style.display = 'block';
    document.getElementById('stage').style.display = 'none';
  });
  window.addEventListener('afterprint', () => {
    printStack.innerHTML = '';
    printStack.style.display = 'none';
    document.getElementById('stage').style.display = '';
  });

  window.addEventListener('message', (e) => { if (e.data && e.data.goto !== undefined) counter.style.background='green'; show(e.data.goto); });
})();
</script>
</body>
</html>
