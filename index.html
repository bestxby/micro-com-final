  window.DECK_MANIFEST = [

    { file: "slides/section0-02-agenda.html",            label: "02 汇报目录与系统设计大纲" },

  window.DECK_HEIGHT = 1080;

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #EAE6DF; /* Soft warm neutral background for outer frame */
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    perspective: 2000px; /* 3D Perspective for Card Flip transition */
  }
  #stage {
    position: fixed;
    top: 50%; left: 50%;
    transform-origin: top left;
    will-change: transform, opacity;
    background: #FCFAF7;
    box-shadow: 0 25px 50px -12px rgba(25, 24, 22, 0.15);
    border-radius: 12px;
    overflow: hidden;
    transform-style: preserve-3d; /* 3D Card Flip support */
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: transparent;
  }
  .counter {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(252, 250, 247, 0.95);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(25, 24, 22, 0.08);
    color: #191816;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    z-index: 100;
    user-select: none;
    box-shadow: 0 4px 12px rgba(25,24,22,0.05);
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .counter:hover {
    background: #CC5A01;
    color: #FCFAF7;
    border-color: #CC5A01;
  }
  .counter:hover .label {
    color: #FCFAF7;
  }

  /* Menu Overlay */
  .menu-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(25, 24, 22, 0.3);
    backdrop-filter: blur(4px);
    z-index: 150;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  /* Slide Index Menu */
  .deck-menu {
    position: fixed;
    bottom: 80px;
    right: 24px;
    width: 380px;
    max-height: 500px;
    background: rgba(252, 250, 247, 0.98);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(25, 24, 22, 0.08);
    border-radius: 16px;
    color: #191816;
    z-index: 200;
    box-shadow: 0 20px 25px -5px rgba(25, 24, 22, 0.1), 0 10px 10px -5px rgba(25, 24, 22, 0.05);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform: translateY(20px) scale(0.95);
    opacity: 0;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  }

  .deck-menu.open {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .deck-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(25, 24, 22, 0.08);
  }

  .deck-menu-header h3 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .close-menu-btn {
    background: transparent;
    border: none;
    color: #807A70;
    font-size: 20px;
    cursor: pointer;
    transition: color 0.15s ease;
  }

  .close-menu-btn:hover {
    color: #191816;
  }

  .deck-menu-list {
    overflow-y: auto;
    padding: 10px 0;
    flex-grow: 1;
  }

  .deck-menu-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    cursor: pointer;
    font-size: 14px;
    color: #47443E;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
  }

  .deck-menu-item:hover {
    background: rgba(25, 24, 22, 0.04);
    color: #191816;
  }

  .deck-menu-item.active {
    background: rgba(15, 118, 110, 0.1);
    color: #0F766E;
    border-left-color: #0F766E;
    font-weight: 600;
  }
  .counter .label {
    color: #807A70;
    margin-left: 8px;
    font-weight: 400;
  }
  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 10%;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left  { left: 0; }
  .nav-zone.right { right: 0; }
  
  .nav-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 50px; height: 50px;
    border-radius: 999px;
    background: rgba(25, 24, 22, 0.02);
    border: 1px solid rgba(25, 24, 22, 0.05);
    color: rgba(25, 24, 22, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 300;
    opacity: 0;
    transition: all 0.2s ease;
  }
  .nav-zone.left  .nav-hint { left: 24px; }
  .nav-zone.right .nav-hint { right: 24px; }
  .nav-zone:hover .nav-hint {
    opacity: 1;
    background: rgba(15, 118, 110, 0.1);
    color: #0F766E;
    border-color: rgba(15, 118, 110, 0.3);
  }

  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { background: #fff; overflow: visible; height: auto; }
    #stage { position: static; transform: none !important; box-shadow: none; border-radius: 0; }
    .counter, .nav-zone { display: none !important; }
    .print-stack { display: block; }
    .print-stack iframe {
      width: 1920px;
      height: 1080px;
      page-break-after: always;
      display: block;
    }
  }
  /* Swipe Curtain */
  .swipe-curtain {
    position: fixed;
    top: 0; left: 0;
    width: 0%; height: 100%;
    background: linear-gradient(135deg, #CC5A01 0%, #0F766E 100%);
    z-index: 999;
    pointer-events: none;
    box-shadow: 0 0 50px rgba(204, 90, 1, 0.2);
    transform: skewX(-8deg);
    transform-origin: left top;
  }
  /* Transition Toast */
  .transition-toast {
    position: fixed;
    top: 32px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(252, 250, 247, 0.95);
    border: 1px solid rgba(15, 118, 110, 0.3);
    box-shadow: 0 10px 25px rgba(25, 24, 22, 0.05);
    color: #0F766E;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.1em;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(8px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
</style>
</head>
<body>

<div class="swipe-curtain" id="swipeCurtain"></div>
<div class="transition-toast" id="transitionToast"></div>

<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>

<div class="nav-zone left"  id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div class="counter" id="counter">1 / 12</div>

<!-- Slide Index Menu popup -->
<div id="menuOverlay" class="menu-overlay" style="display: none;"></div>
<div id="deckMenu" class="deck-menu" style="display: none;">
  <div class="deck-menu-header">
    <h3>幻灯片目录</h3>
    <button id="closeMenuBtn" class="close-menu-btn">&times;</button>
  </div>
  <div class="deck-menu-list" id="deckMenuList"></div>
</div>

<div class="print-stack" id="printStack" style="display:none;"></div>

<script>
(function () {
  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const printStack = document.getElementById('printStack');
  const storageKey = 'deck-index-' + location.pathname;
  let current = 0;
  let currentScale = 1;
  let currentX = 0;
  let currentY = 0;
  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    currentScale = Math.min(window.innerWidth / W, window.innerHeight / H);
    currentX = (window.innerWidth  - W * currentScale) / 2;
    currentY = (window.innerHeight - H * currentScale) / 2;
    stage.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
    stage.style.top = '0';
    stage.style.left = '0';
  }

  function show(idx) {
    if (idx < 0 || idx >= deck.length) return;
    current = idx;
    
    frame.src = deck[idx].file + '?v=' + Date.now();
    counter.innerHTML = `${idx + 1} / ${deck.length} <span class="label">${deck[idx].label || ''}</span>`;
    try { localStorage.setItem(storageKey, String(idx)); } catch (_) {}
    if (location.hash !== '#' + (idx + 1)) {
      history.replaceState(null, '', '#' + (idx + 1));
    }
    updateMenuHighlight(idx);
    
    // Set styles instantly with no transitions or fades
    stage.style.opacity = '1';
    stage.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
  }

  frame.addEventListener('load', () => {
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if (doc && doc.head) {
        const style = doc.createElement('style');
        style.textContent = '.slide-footer .slide-number { display: none !important; }';
        doc.head.appendChild(style);
      }
      
      // Forward keydown events from the iframe to the parent window to support keyboard navigation when focused inside the iframe
      if (frame.contentWindow) {
        frame.contentWindow.addEventListener('keydown', (e) => {
          document.dispatchEvent(new KeyboardEvent('keydown', {
            key: e.key,
            code: e.code,
            keyCode: e.keyCode,
            which: e.which,
            bubbles: true,
            ctrlKey: e.ctrlKey,
            shiftKey: e.shiftKey,
            altKey: e.altKey,
            metaKey: e.metaKey
          }));
        });
      }
    } catch (e) {
      console.warn("Could not inject style or add event forwarding inside iframe:", e);
    }
  });

  function next() { show(Math.min(current + 1, deck.length - 1)); }
  function prev() { show(Math.max(current - 1, 0)); }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft':  case 'PageUp':              e.preventDefault(); prev(); break;
      case 'Home':                                    e.preventDefault(); show(0); break;
      case 'End':                                     e.preventDefault(); show(deck.length - 1); break;
      case 'p': case 'P':                             window.print(); break;
      default:
        // Key 1-9 jumper
        if (e.key >= '1' && e.key <= '9') {
          const i = parseInt(e.key, 10) - 1;
          if (i < deck.length) { e.preventDefault(); show(i); }
        }
    }
  });

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  window.addEventListener('resize', fit);
  
  window.addEventListener('hashchange', () => {
    const m = location.hash.match(/^#(\d+)$/);
    if (m) show(parseInt(m[1], 10) - 1);
  });

  // Init routing: hash > localStorage > 0
  const hashMatch = location.hash.match(/^#(\d+)$/);
  if (hashMatch) {
    current = Math.min(parseInt(hashMatch[1], 10) - 1, deck.length - 1);
  } else {
    try {
      const v = parseInt(localStorage.getItem(storageKey), 10);
      if (!isNaN(v) && v >= 0 && v < deck.length) current = v;
    } catch (_) {}
  }
  fit();
  show(current);

  // Menu Popup Logic
  const deckMenu = document.getElementById('deckMenu');
  const deckMenuList = document.getElementById('deckMenuList');
  const menuOverlay = document.getElementById('menuOverlay');
  const closeMenuBtn = document.getElementById('closeMenuBtn');

  function buildMenu() {
    deckMenuList.innerHTML = '';
    deck.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'deck-menu-item';
      if (idx === current) div.classList.add('active');
      div.textContent = item.label || `Slide ${idx + 1}`;
      div.addEventListener('click', () => {
        show(idx);
        closeMenu();
      });
      deckMenuList.appendChild(div);
    });
  }

  function updateMenuHighlight(idx) {
    const items = deckMenuList.querySelectorAll('.deck-menu-item');
    items.forEach((item, i) => {
      if (i === idx) {
        item.classList.add('active');
        try {
          item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        } catch (_) {
          item.scrollIntoView();
        }
      } else {
        item.classList.remove('active');
      }
    });
  }

  function openMenu() {
    buildMenu();
    deckMenu.style.display = 'flex';
    menuOverlay.style.display = 'block';
    setTimeout(() => {
      deckMenu.classList.add('open');
      menuOverlay.style.opacity = '1';
    }, 10);
  }

  function closeMenu() {
    deckMenu.classList.remove('open');
    menuOverlay.style.opacity = '0';
    setTimeout(() => {
      deckMenu.style.display = 'none';
      menuOverlay.style.display = 'none';
    }, 250);
  }

  counter.addEventListener('click', (e) => {
    e.stopPropagation();
    if (deckMenu.style.display === 'flex') {
      closeMenu();
    } else {
      openMenu();
    }
  });

  closeMenuBtn.addEventListener('click', closeMenu);
  menuOverlay.addEventListener('click', closeMenu);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMenu();
  });

  // Print support
  window.addEventListener('beforeprint', () => {
    printStack.innerHTML = '';
    deck.forEach(item => {
      const f = document.createElement('iframe');
      f.src = item.file;
      printStack.appendChild(f);
    });
    printStack.style.display = 'block';
    document.getElementById('stage').style.display = 'none';
  });
  window.addEventListener('afterprint', () => {
    printStack.innerHTML = '';
    printStack.style.display = 'none';
    document.getElementById('stage').style.display = '';
  });
})();
</script>

</body>
